<!DOCTYPE html>
<html lang = "en">
	<head>
		<title>Add Book</title>
		<style>
			body{
				background-color:#FCE5B1;
				margin: 0;
				font-family: Arial, sans-serif;
			}
			.bookFormContainer{
				text-align: center;
				background-color:#FFF7EB;
				width:80%;
				max-width: 700px;
				margin: 0 auto;
				padding: 20px;
				border: 1px;
				border-radius: 12px;
				box-shadow:0 2px 6px rgba(0, 0, 0, 0.1)
			}
			.button-container{
				text-align: center;
				margin-top: 20px
			}
			.button-container button{
				background-color: #FFD68A;
				border:1px;
				box-shadow:0 2px 6px rgba(0, 0, 0, 0.1);
				border-radius: 12px;
				padding: 12px 24px;
				min-width: 130px;
				margin: 0 10px
			}
			.button-container button:hover{
				background-color: #FFEAC2;
				border:1px;
				box-shadow:0 2px 6px rgba(0, 0, 0, 0.1);
				border-radius: 12px;
			}
		</style>
	</head>
	<body>
		<br>
		<h1 style = "text-align:center;">Add a Book</h1><br><br>
		<h3 style = "text-align:center;">Enter the book details below to save it to your collection.. Fields marked * are required.</h1><br><br>
		<div class = "bookFormContainer">
			<form id = "bookForm">
				<label for = "book_title"><b>Book Title * </b></label><br>
				<input type = "text" id = "book_title" name = "book_title" placeholder = "e.g., The Alchemist" autofocus required><br>
				<p style = "text-align:center;"><i>[Avoid special characters; use the official title]</i><p><br><br>
				<label for = "author_name"><b>Author Name *</b></label><br>
				<input type = "text" id = "author_name" name = "author_name" placeholder = "e.g.,Paulo Coelho" required><br>
				<p style = "text-align:center;"><i>[First name and last name preferred]</i></p><br><br>
				<!--<button type = "submit" onclick = "addBookData(); launchHomeScreen()">Submit</button> -->
				<div class = "button-container">
					<button type = "submit"><b>Submit</b></button>
				</div>
			</form>
		</div>
		<script src = "/static/book_management.js"></script>
		<script>
			document.getElementById("bookForm").addEventListener("submit", (e) => {
				e.preventDefault();
				addBookData();
				launchHomeScreen();
				});
		</script>
	</body>
</html>
